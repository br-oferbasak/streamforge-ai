version: "1"
name: duplicate-ids

source:
  type: kafka_cdc
  topic: some.topic
  bootstrap_servers: localhost:9092

transforms:
  - id: my-filter
    type: filter
    condition: "op == 'c'"

  - id: my-filter
    type: filter
    condition: "after.user_id != null"

sink:
  type: kafka
  topic: out.topic
  bootstrap_servers: localhost:9092
